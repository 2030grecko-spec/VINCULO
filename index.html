<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo - Red Social de Valor</title>
    <style>
        /* TU ESTILO ORIGINAL DORADO */
        body { margin: 0; background: #000; color: #D4AF37; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        #video-feed { position: absolute; width: 100%; height: 100%; z-index: 1; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #camila-layer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; text-align: center; }
        .octagon { width: 160px; height: 160px; background: rgba(0,0,0,0.6); clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); border: 2px solid #D4AF37; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #D4AF37; } 50% { box-shadow: 0 0 25px #FFD700; } 100% { box-shadow: 0 0 10px #D4AF37; } }
        
        /* DISEÑO DEL SIMULADOR PROFESIONAL */
        #business-sim { position: absolute; bottom: 80px; width: 90%; left: 5%; background: rgba(0,0,0,0.9); border: 1px solid #D4AF37; border-radius: 12px; z-index: 25; padding: 15px; }
        .sim-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        input[type=range] { width: 65%; accent-color: #D4AF37; }
        .prob-box { text-align: center; border-top: 1px solid #444; padding-top: 10px; }
        .big-prob { font-size: 22px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }

        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 65px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.9); border-top: 1px solid #D4AF37; z-index: 30; }
        .nav-item { color: #D4AF37; font-size: 11px; padding: 15px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="video-feed">
        <video id="main-player" autoplay loop muted playsinline><source src="" type="video/mp4"></video>
    </div>

    <div id="camila-layer">
        <div class="octagon"><h2>IA</h2></div>
        <div id="status" style="letter-spacing: 3px; margin-top: 5px;">SISTEMA VÍNCULO</div>
        <p id="camila-feedback" style="font-size: 12px; margin-top: 15px; padding: 5px; background: rgba(0,0,0,0.7); min-height: 20px;">"Analizando el ADN del video..."</p>
    </div>

    <div id="business-sim">
        <div class="sim-row">
            <span>VALOR ADN</span>
            <input type="range" id="sim-valor" min="0" max="1000" value="500" oninput="actualizarVinculo()">
        </div>
        <div class="sim-row">
            <span>RETENCIÓN</span>
            <input type="range" id="sim-ret" min="0" max="100" value="50" oninput="actualizarVinculo()">
        </div>
        <div class="prob-box">
            <span>PROBABILIDAD VIRAL: <span id="prob-val" class="big-prob">0%</span></span>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">INICIO</div>
        <div class="nav-item" onclick="document.getElementById('videoInput').click()">SUBIR</div>
        <div class="nav-item">ACADEMIA</div>
    </div>

    <input type="file" id="videoInput" accept="video/*" hidden>

    <script type="module">
        import { socket, enviar, recibir } from "./stream/socketClient.js";
        import { calcularViralidad } from "./engine/viralEngine.js";
        import { CamilaCore } from "./core/camilaCore.js";

        // Función global para que los sliders funcionen
        window.actualizarVinculo = function() {
            const v = document.getElementById('sim-valor').value;
            const r = document.getElementById('sim-ret').value;

            // 1. Usamos el Engine de Viralidad Real
            const data = { valor: +v, watchTime: +r/100, likes: 50, shares: 10 };
            const res = calcularViralidad(data, { tipo: "Business" });
            
            document.getElementById('prob-val').innerText = res.prob + "%";

            // 2. Camila procesa y lanza la VOZ (Core)
            const msg = CamilaCore.procesar({ valor: +v, retencion: +r });
            document.getElementById('camila-feedback').innerText = msg;

            // 3. Avisamos al servidor en la nube
            enviar({ type: "analizar", valor: +v, retencion: +r });
        };

        // Escuchamos la respuesta del servidor para actualizar texto
        recibir((data) => {
            if (data.type === "camila") {
                document.getElementById('camila-feedback').innerText = data.text;
            }
        });
    </script>
</body>
</html>
