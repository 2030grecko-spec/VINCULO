<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo - Red Social de Valor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="video-feed">
        <video id="main-player" autoplay loop muted playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div id="camila-layer">
        <div class="camila-entidad">
            <div id="camila-avatar"></div>
        </div>
        <div id="status">SISTEMA VÍNCULO</div>
        <p id="camila-feedback">"Analizando el ADN del video..."</p>
    </div>

    <div class="right-controls">
        <button id="btn-business" class="btn-main">💼</button>
        <button id="btn-impulso" class="btn-main">⚡</button>
        <button id="btn-comentarios" class="btn-main">💬</button>
        <button id="btn-vincular" class="btn-main">❤️</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item">INICIO</div>
        <div class="nav-item">PENSAMIENTO</div>
        <div class="nav-item" id="btn-boveda">BÓVEDA</div>
    </nav>

    <script src="app.js" type="module"></script>
</body>
</html>
