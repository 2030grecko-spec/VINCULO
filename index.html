<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo - Red Social de Valor</title>
    <style>
        body { margin: 0; background: #000; color: #D4AF37; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        #video-feed { position: absolute; width: 100%; height: 100%; z-index: 1; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #camila-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; text-align: center; }
        .octagon { width: 180px; height: 180px; background: rgba(0,0,0,0.6); clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); border: 2px solid #D4AF37; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #D4AF37; } 50% { box-shadow: 0 0 25px #FFD700; } 100% { box-shadow: 0 0 10px #D4AF37; } }
        #voting-tray { position: absolute; bottom: -100%; width: 100%; height: 40%; background: rgba(0,0,0,0.95); border-top: 2px solid #D4AF37; z-index: 20; transition: 0.5s; padding: 20px; text-align: center; }
        #voting-tray.active { bottom: 0; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); z-index: 30; }
        .nav-item { color: #D4AF37; font-size: 10px; padding: 10px; }
    </style>
</head>
<body>
    <div id="video-feed"><video id="main-player" autoplay loop muted playsinline><source src="" type="video/mp4"></video></div>
    <div id="camila-layer"><div class="octagon"><h2>AI</h2></div><div id="status">SISTEMA VÍNCULO</div></div>
    <div id="voting-tray"><h3>Gala de Valores: ¡Vota!</h3><div id="options"></div></div>
    <div class="nav-bar">
        <div class="nav-item">INICIO</div><div class="nav-item">VALOR</div><div class="nav-item">ACADEMIA (8va)</div>
    </div>
    <script type="module" src="firebaseConfig.js"></script>
    <script type="module" src="CamilaBrain.js"></script>
</body>
</html>
