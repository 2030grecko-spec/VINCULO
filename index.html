<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo - Red Social de Valor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="video-feed">
        <video id="main-player" autoplay loop muted playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div id="camila-layer">
        <div class="camila-entidad">
            <div id="camila-avatar"></div>
        </div>
        <div id="status">SISTEMA VÍNCULO</div>
        <div id="chat" style="color: #FFD700; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;">
            <p id="camila-feedback">"Analizando el ADN del video..."</p>
        </div>
    </div>

    <div class="right-controls">
        <button id="btn-business" class="btn-main">💼</button>
        <button id="btn-impulso" class="btn-main">⚡</button>
        <button id="btn-comentarios" class="btn-main">💬</button>
        <button id="btn-vincular" class="btn-main">❤️</button>
        <button id="btn-micro" class="btn-main" onclick="iniciarVoz()" style="background: #FFD700; color: black; margin-top: 10px;">🎙️</button>
    </div>

    <div class="input-area" style="position: fixed; bottom: 80px; width: 100%; display: flex; padding: 10px; box-sizing: border-box;">
        <input id="input" type="text" placeholder="Orden para Camila..." style="flex: 1; padding: 15px; background: #222; color: white; border: 1px solid #FFD700; border-radius: 5px;">
        <button onclick="enviarMensaje()" style="background: #FFD700; padding: 15px; border: none; font-weight: bold;">ENVIAR</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item">INICIO</div>
        <div class="nav-item">PENSAMIENTO</div>
        <div class="nav-item" id="btn-boveda">BÓVEDA</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
