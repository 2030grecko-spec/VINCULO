<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo - Red Social de Valor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000; margin: 0; overflow: hidden;">

    <div id="video-feed">
        <video id="main-player" autoplay loop muted playsinline style="width: 100%; height: 100vh; object-fit: cover;">
            <source src="" type="video/mp4">
        </video>
    </div>

    <div id="canvas-jeroglificos" style="position: absolute; top: 0; left: 0; width: 50%; height: 100%; pointer-events: none; z-index: 5;"></div>

    <div id="camila-layer" style="position: absolute; top: 20px; left: 20px; z-index: 10; width: 80%;">
        <div id="status" style="color: #FFD700; font-size: 0.8em; letter-spacing: 2px;">SISTEMA VÍNCULO | JGLM</div>
        <div id="chat" style="margin-top: 20px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border-left: 5px solid #FFD700;">
            <p id="camila-feedback" style="color: #FFD700; font-size: 1.5em; font-weight: bold; margin: 0;">"Esperando sus órdenes, Monarca..."</p>
        </div>
    </div>

    <div class="right-controls" style="position: fixed; right: 20px; top: 20%; display: flex; flex-direction: column; gap: 20px; z-index: 20;">
        <button id="btn-business" class="btn-main" style="font-size: 30px; background: none; border: 2px solid #FFD700; border-radius: 50%; padding: 10px; color: #FFD700;">💼</button>
        <button id="btn-impulso" class="btn-main" style="font-size: 30px; background: none; border: 2px solid #FFD700; border-radius: 50%; padding: 10px; color: #FFD700;">⚡</button>
        <button id="btn-comentarios" class="btn-main" style="font-size: 30px; background: none; border: 2px solid #FFD700; border-radius: 50%; padding: 10px; color: #FFD700;">💬</button>
        <button id="btn-vincular" class="btn-main" style="font-size: 30px; background: none; border: 2px solid #FFD700; border-radius: 50%; padding: 10px; color: #FFD700;">❤️</button>
        <button id="btn-micro" onclick="iniciarVoz()" style="font-size: 40px; background: #FFD700; border: none; border-radius: 50%; padding: 15px; color: #000; box-shadow: 0 0 20px #FFD700;">🎙️</button>
    </div>

    <div class="input-area" style="position: fixed; bottom: 90px; width: 100%; display: flex; padding: 15px; box-sizing: border-box; z-index: 25;">
        <input id="input" type="text" placeholder="Orden para Camila..." style="flex: 1; padding: 20px; background: #111; color: #FFD700; border: 2px solid #FFD700; border-radius: 10px; font-size: 1.2em;">
        <button onclick="enviarMensaje()" style="background: #FFD700; color: #000; padding: 0 30px; border: none; border-radius: 10px; margin-left: 10px; font-weight: bold; font-size: 1.1em;">ENVIAR</button>
    </div>

    <nav class="nav-bar" style="position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #333; z-index: 30;">
        <div class="nav-item" style="color: #666; font-weight: bold;">INICIO</div>
        <div class="nav-item" style="color: #666; font-weight: bold;">PENSAMIENTO</div>
        <div class="nav-item" id="btn-boveda" style="color: #FFD700; font-weight: bold;">BÓVEDA</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
